<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈吉米的天气预报</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #2d3748;
            --text-secondary: #718096;
            --accent: #0078D4;
            --accent-hover: #005A9E;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
            --cat-bg: #FFF8F0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei UI', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: all 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 头部 */
        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 20px;
            font-weight: bold;
            color: var(--text);
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            background: var(--bg);
            transition: all 0.2s;
            position: relative;
        }

        .btn:hover {
            background: var(--accent);
            color: white;
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 悬停提示 */
        .tooltip {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .btn:hover .tooltip {
            opacity: 1;
        }

        /* 地区显示 */
        .region-display {
            text-align: center;
            padding: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .update-time {
            text-align: center;
            font-size: 11px;
            color: #a0aec0;
            padding-bottom: 4px;
        }

        /* 天气卡片 */
        .weather-card {
            margin: 12px 20px;
            padding: 24px;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .weather-icon {
            font-size: 72px;
            line-height: 1;
        }

        .weather-temp {
            font-size: 56px;
            font-weight: bold;
            color: var(--text);
            line-height: 1;
        }

        .weather-desc {
            font-size: 18px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 4px 0;
        }

        .detail-label {
            color: var(--text-secondary);
        }

        .detail-value {
            font-weight: bold;
            color: var(--text);
        }

        /* 预报 */
        .forecast-title {
            font-size: 15px;
            font-weight: bold;
            color: var(--text);
            padding: 8px 24px;
        }

        .forecast-container {
            display: flex;
            gap: 6px;
            padding: 0 20px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .forecast-container::-webkit-scrollbar {
            display: none;
        }

        .forecast-card {
            flex: 1;
            min-width: 52px;
            background: var(--bg);
            border-radius: 12px;
            padding: 10px 6px;
            text-align: center;
            transition: all 0.2s;
        }

        .forecast-card:hover {
            background: #e0f2fe;
            transform: translateY(-2px);
        }

        .forecast-day {
            font-size: 11px;
            font-weight: bold;
            color: var(--text);
        }

        .forecast-icon {
            font-size: 28px;
            margin: 4px 0;
        }

        .forecast-desc {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .forecast-temp {
            font-size: 11px;
            font-weight: bold;
            color: var(--text);
        }

        /* 小猫 */
        .cat-container {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 8px 20px 16px;
            gap: 4px;
        }

        .cat-canvas {
            width: 100px;
            height: 65px;
        }

        .cat-text {
            font-size: 10px;
            color: #a0aec0;
        }

        /* 底部 */
        .footer {
            text-align: center;
            font-size: 10px;
            color: #a0aec0;
            padding: 8px 20px 16px;
        }

        /* 选择器弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 420px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-header {
            padding: 16px 20px;
            font-size: 16px;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        .locate-btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .locate-btn:hover {
            background: var(--accent-hover);
        }

        .section-title {
            font-size: 13px;
            font-weight: bold;
            color: var(--text);
            margin: 8px 0 4px;
        }

        .option-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .option-btn {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .option-btn:hover {
            border-color: var(--accent);
            background: #e0f2fe;
        }

        .option-btn.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .selection-info {
            text-align: center;
            font-size: 13px;
            color: var(--accent);
            padding: 8px;
            font-weight: bold;
        }

        .modal-footer {
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
        }

        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: var(--text);
        }

        .btn-confirm {
            background: var(--accent);
            color: white;
        }

        .btn-confirm:hover {
            background: var(--accent-hover);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .app-container {
                border-radius: 0;
            }
            body {
                padding: 0;
            }
        }

        /* 暗色模式 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #2d3748;
                --card-bg: #1a202c;
                --text: #e2e8f0;
                --text-secondary: #a0aec0;
                --border: #4a5568;
                --shadow: 0 4px 20px rgba(0,0,0,0.3);
            }
            .weather-card {
                background: linear-gradient(135deg, #1e3a5f 0%, #2d4a6f 100%);
            }
            .option-btn {
                background: #2d3748;
                border-color: #4a5568;
            }
            .modal {
                background: #1a202c;
            }
            .btn-cancel {
                background: #4a5568;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

            <div class="header-buttons">

                    <span class="tooltip">更换地区</span>

                <button class="btn" onclick="updateWeather()">
                    🔄
                    <span class="tooltip">刷新天气</span>
                </button>
            </div>
        </div>

        <!-- 地区 -->
        <div class="region-display" id="regionDisplay">📍 定位中...</div>
        <div class="update-time" id="updateTime"></div>

        <!-- 天气卡片 -->
        <div class="weather-card" id="weatherCard">
            <div class="weather-icon" id="weatherIcon">🌤️</div>
            <div class="weather-temp" id="weatherTemp">--°C</div>
            <div class="weather-desc" id="weatherDesc">加载中...</div>
            <div class="weather-details" id="weatherDetails"></div>
        </div>

        <!-- 预报 -->
        <div class="forecast-title">📅 7天天气预报</div>
        <div class="forecast-container" id="forecastContainer"></div>

        <!-- 小猫 -->
        <div class="cat-container">
            <canvas class="cat-canvas" id="catCanvas" width="100" height="65"></canvas>
            <span class="cat-text">呼呼~ 💤</span>
        </div>

        <!-- 底部 -->
        <div class="footer">💡 点击📍切换地区 | 🔄 刷新 | ⏰ 每小时自动更新</div>
    </div>

    <!-- 地区选择弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">📍 选择地区</div>
            <div class="modal-body">
                <button class="locate-btn" onclick="locateCurrent()">📍 定位：<span id="locateText">当前地区</span></button>
                
                <div class="section-title">▼ 省份 / 自治区 / 直辖市</div>
                <div class="option-list" id="provinceList"></div>
                
                <div class="section-title" id="cityTitle">▼ 城市（请先选择省份）</div>
                <div class="option-list" id="cityList"></div>
                
                <div class="section-title" id="districtTitle">▼ 区/县（请先选择城市）</div>
                <div class="option-list" id="districtList"></div>
                
                <div class="selection-info" id="selectionInfo">当前未选择地区</div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn btn-cancel" onclick="closeSelector()">❌ 取消</button>
                <button class="modal-btn btn-confirm" onclick="confirmSelection()">✅ 确认选择</button>
            </div>
        </div>
    </div>

            "山西": {"太原":["小店区","迎泽区","杏花岭区","尖草坪区","万柏林区","晋源区"]},

            "云南": {"昆明":["五华区","盘龙区","官渡区","西山区","东川区","呈贡区"]},
            "贵州": {"贵阳":["南明区","云岩区","花溪区","乌当区","白云区","观山湖区"]},
            "海南": {"海口":["秀英区","龙华区","琼山区","美兰区"],"三亚":["海棠区","吉阳区","天涯区","崖州区"]},
            "甘肃": {"兰州":["城关区","七里河区","西固区","安宁区","红古区"]},
            "青海": {"西宁":["城东区","城中区","城西区","城北区"]},
            "宁夏回族自治区": {"银川":["兴庆区","西夏区","金凤区","灵武市","永宁县","贺兰县"]},
            "新疆维吾尔自治区": {"乌鲁木齐":["天山区","沙依巴克区","新市区","水磨沟区","头屯河区","米东区"]},
            "西藏自治区": {"拉萨":["城关区","堆龙德庆区","达孜区"]},
            "江西": {"南昌":["东湖区","西湖区","青云谱区","青山湖区","新建区","红谷滩区","南昌县"]},
            "台湾": {"台北":["中正区","大同区","中山区","松山区","大安区","万华区","信义区","士林区"],"高雄":["楠梓区","左营区","鼓山区","三民区","苓雅区"]},
            "香港": {"香港":["中西区","湾仔区","东区","南区","油尖旺区","深水埗区","九龙城区"]},
            "澳门": {"澳门":["花地玛堂区","圣安多尼堂区","大堂区","望德堂区","风顺堂区"]}
        };

        // ============================================
        // 应用状态
        // ============================================
        let state = {
            province: '北京',
            city: '北京',
            district: '朝阳区',
            selectedProvince: null,
            selectedCity: null,
            selectedDistrict: null
        };

        // 加载保存的配置
        const saved = localStorage.getItem('weather_region');
        if (saved) {
            try {
                const config = JSON.parse(saved);
                state.province = config.province;
                state.city = config.city;
                state.district = config.district;
            } catch(e) {}
        }

        // ============================================
        // 天气数据生成
        // ============================================
        function seededRandom(seed) {
            let s = seed;
            return function() {
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                return s / 0x7fffffff;
            };
        }

        function getWeatherData(province, city, district) {
            let seed = 0;
            const str = province + city + district;
            for (let i = 0; i < str.length; i++) seed += str.charCodeAt(i);
            const rand = seededRandom(seed);
            
            const weathers = ['晴','多云','阴','小雨','中雨','阵雨'];
            const windDirs = ['北风','东北风','东风','东南风','南风','西南风','西风','西北风'];
            
            return {
                temp: Math.floor(rand() * 20 + 15),
                feelsLike: Math.floor(rand() * 24 + 13),
                text: weathers[Math.floor(rand() * weathers.length)],
                windDir: windDirs[Math.floor(rand() * windDirs.length)],
                windScale: Math.floor(rand() * 5) + 1,
                humidity: Math.floor(rand() * 60) + 30,
                pressure: Math.floor(rand() * 20) + 1000
            };
        }

        function getForecastData(province, city, district) {
            let seed = 0;
            const str = province + city + district + 'forecast';
            for (let i = 0; i < str.length; i++) seed += str.charCodeAt(i);
            const rand = seededRandom(seed);
            const weathers = ['晴','多云','阴','小雨','中雨','阵雨'];
            
            return Array.from({length: 7}, () => ({
                tempMax: Math.floor(rand() * 15 + 22),
                tempMin: Math.floor(rand() * 12 + 10),
                textDay: weathers[Math.floor(rand() * weathers.length)]
            }));
        }

        // ============================================
        // UI 更新
        // ============================================
        const weatherIcons = {'晴':'☀️','多云':'⛅','阴':'☁️','小雨':'🌧️','中雨':'🌧️','阵雨':'⛈️'};

        function updateWeather() {
            const data = getWeatherData(state.province, state.city, state.district);
            const forecast = getForecastData(state.province, state.city, state.district);
            
            document.getElementById('weatherIcon').textContent = weatherIcons[data.text] || '🌤️';
            document.getElementById('weatherTemp').textContent = `${data.temp}°C`;
            document.getElementById('weatherDesc').textContent = data.text;
            
            document.getElementById('weatherDetails').innerHTML = `
                <div class="detail-item"><span class="detail-label">体感温度</span><span class="detail-value">${data.feelsLike}°</span></div>
                <div class="detail-item"><span class="detail-label">湿度</span><span class="detail-value">${data.humidity}%</span></div>
                <div class="detail-item"><span class="detail-label">风力</span><span class="detail-value">${data.windDir} ${data.windScale}级</span></div>
                <div class="detail-item"><span class="detail-label">气压</span><span class="detail-value">${data.pressure} hPa</span></div>
            `;
            
            const days = ['今天','明天','后天','周三','周四','周五','周六'];
            document.getElementById('forecastContainer').innerHTML = forecast.map((d, i) => `
                <div class="forecast-card">
                    <div class="forecast-day">${days[i]}</div>
                    <div class="forecast-icon">${weatherIcons[d.textDay] || '🌤️'}</div>
                    <div class="forecast-desc">${d.textDay}</div>
                    <div class="forecast-temp">${d.tempMax}° ${d.tempMin}°</div>
                </div>
            `).join('');
            
            updateRegionDisplay();
            
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                `⏰ 更新时间：${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
        }

        function updateRegionDisplay() {
            const text = state.province === state.city 
                ? `📍 ${state.province} - ${state.district}`
                : `📍 ${state.province} ${state.city} - ${state.district}`;
            document.getElementById('regionDisplay').textContent = text;
            document.getElementById('locateText').textContent = `${state.province} ${state.city} ${state.district}`;
        }

        // ============================================
        // 地区选择器
        // ============================================
        function openSelector() {
            document.getElementById('modalOverlay').classList.add('active');
            state.selectedProvince = null;
            state.selectedCity = null;
            state.selectedDistrict = null;
            renderProvinces();
            document.getElementById('cityList').innerHTML = '';
            document.getElementById('districtList').innerHTML = '';
            document.getElementById('cityTitle').textContent = '▼ 城市（请先选择省份）';
            document.getElementById('districtTitle').textContent = '▼ 区/县（请先选择城市）';
            document.getElementById('selectionInfo').textContent = '当前未选择地区';
            document.getElementById('selectionInfo').style.color = 'gray';
        }

        function closeSelector() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function renderProvinces() {
            const container = document.getElementById('provinceList');
            container.innerHTML = Object.keys(CHINA_REGIONS).map(p => 
                `<button class="option-btn ${state.selectedProvince === p ? 'selected' : ''}" 
                    onclick="selectProvince('${p}')">${p}</button>`
            ).join('');
        }

        function selectProvince(province) {
            state.selectedProvince = province;
            state.selectedCity = null;
            state.selectedDistrict = null;
            renderProvinces();
            
            const cities = CHINA_REGIONS[province];
            document.getElementById('cityList').innerHTML = Object.keys(cities).map(c =>
                `<button class="option-btn ${state.selectedCity === c ? 'selected' : ''}" 
                    onclick="selectCity('${c}')">${c}</button>`
            ).join('');
            document.getElementById('districtList').innerHTML = '';
            document.getElementById('cityTitle').textContent = `▼ 城市 - ${province}`;
            document.getElementById('districtTitle').textContent = '▼ 区/县（请先选择城市）';
            updateSelectionInfo();
        }

        function selectCity(city) {
            if (!state.selectedProvince) return;
            state.selectedCity = city;
            state.selectedDistrict = null;
            
            const cities = CHINA_REGIONS[state.selectedProvince];
            document.getElementById('cityList').innerHTML = Object.keys(cities).map(c =>
                `<button class="option-btn ${state.selectedCity === c ? 'selected' : ''}" 
                    onclick="selectCity('${c}')">${c}</button>`
            ).join('');
            
            const districts = cities[city];
            document.getElementById('districtList').innerHTML = districts.map(d =>
                `<button class="option-btn ${state.selectedDistrict === d ? 'selected' : ''}" 
                    onclick="selectDistrict('${d}')">${d}</button>`
            ).join('');
            document.getElementById('districtTitle').textContent = `▼ 区/县 - ${city}`;
            updateSelectionInfo();
        }

        function selectDistrict(district) {
            state.selectedDistrict = district;
            const cities = CHINA_REGIONS[state.selectedProvince];
            const districts = cities[state.selectedCity];
            document.getElementById('districtList').innerHTML = districts.map(d =>
                `<button class="option-btn ${state.selectedDistrict === d ? 'selected' : ''}" 
                    onclick="selectDistrict('${d}')">${d}</button>`
            ).join('');
            updateSelectionInfo();
        }

        function locateCurrent() {
            selectProvince(state.province);
            selectCity(state.city);
            selectDistrict(state.district);
        }

        function updateSelectionInfo() {
            const parts = [state.selectedProvince, state.selectedCity, state.selectedDistrict].filter(Boolean);
            const info = document.getElementById('selectionInfo');
            if (parts.length) {
                info.textContent = `📍 当前选择：${parts.join(' - ')}`;
                info.style.color = '#0078D4';
            } else {
                info.textContent = '当前未选择地区';
                info.style.color = 'gray';
            }
        }

        function confirmSelection() {
            if (state.selectedProvince && state.selectedCity && state.selectedDistrict) {
                state.province = state.selectedProvince;
                state.city = state.selectedCity;
                state.district = state.selectedDistrict;
                localStorage.setItem('weather_region', JSON.stringify({
                    province: state.province,
                    city: state.city,
                    district: state.district
                }));
                closeSelector();
                updateWeather();
            } else {
                const info = document.getElementById('selectionInfo');
                if (!state.selectedProvince) info.textContent = '⚠️ 请选择省份';
                else if (!state.selectedCity) info.textContent = '⚠️ 请选择城市';
                else info.textContent = '⚠️ 请选择区/县';
                info.style.color = 'orange';
            }
        }

        // 点击弹窗外部关闭
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeSelector();
        });

        // ============================================
        // 小猫动画
        // ============================================
        function drawCat() {
            const canvas = document.getElementById('catCanvas');
            const ctx = canvas.getContext('2d');
            let breath = 0;
            let tail = 0;

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                breath += 0.08;
                tail += 0.06;
                const bo = Math.sin(breath) * 2;
                const ts = Math.sin(tail) * 15;

                // 身体
                ctx.fillStyle = '#FFB347';
                ctx.strokeStyle = '#E8953A';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.ellipse(60, 42 + bo, 35, 16, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 头
                ctx.beginPath();
                ctx.arc(22, 38 + bo, 13, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // 耳朵
                ctx.beginPath();
                ctx.moveTo(14, 28 + bo);
                ctx.lineTo(10, 16 + bo);
                ctx.lineTo(18, 25 + bo);
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(26, 26 + bo);
                ctx.lineTo(32, 14 + bo);
                ctx.lineTo(34, 28 + bo);
                ctx.fill();

                // 眼睛（闭着）
                ctx.strokeStyle = '#5D3A1A';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(17, 35 + bo, 4, Math.PI, 0);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(27, 35 + bo, 4, Math.PI, 0);
                ctx.stroke();

                // 鼻子
                ctx.fillStyle = '#FF8C94';
                ctx.beginPath();
                ctx.ellipse(22, 40 + bo, 3, 2, 0, 0, Math.PI * 2);
                ctx.fill();

                // 嘴巴
                ctx.strokeStyle = '#5D3A1A';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(22, 42 + bo);
                ctx.lineTo(22, 45 + bo);
                ctx.stroke();

                // 胡须
                ctx.strokeStyle = '#CC8833';
                ctx.beginPath(); ctx.moveTo(10, 39+bo); ctx.lineTo(0, 37+bo); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, 41+bo); ctx.lineTo(0, 42+bo); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(34, 39+bo); ctx.lineTo(44, 37+bo); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(34, 41+bo); ctx.lineTo(44, 42+bo); ctx.stroke();

                // 前爪
                ctx.fillStyle = '#FFB347';
                ctx.strokeStyle = '#E8953A';
                ctx.lineWidth = 1;
                ctx.beginPath(); ctx.ellipse(38, 56+bo, 7, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(52, 56+bo, 7, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#FFCC80';
                ctx.beginPath(); ctx.ellipse(39, 57+bo, 3, 2, 0, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(53, 57+bo, 3, 2, 0, 0, Math.PI*2); ctx.fill();

                // 摇摆尾巴
                ctx.strokeStyle = '#FFB347';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(88, 46 + bo);
                ctx.quadraticCurveTo(95 + Math.sin(ts*1.2)*6, 34+bo, 100+Math.sin(ts*1.5)*8, 20+bo+Math.cos(ts)*4);
                ctx.stroke();
                ctx.fillStyle = '#FFB347';
                ctx.beginPath();
                ctx.arc(100+Math.sin(ts*1.5)*8, 20+bo+Math.cos(ts)*4, 4, 0, Math.PI*2);
                ctx.fill();

                // ZZZ
                ctx.fillStyle = '#AAD4F0';
                ctx.font = 'bold 10px "Comic Sans MS"';
                ctx.fillText('z', 48, 10+bo+Math.sin(breath*1.5)*3);
                ctx.font = 'bold 12px "Comic Sans MS"';
                ctx.fillText('Z', 58, 2+bo+Math.sin(breath*1.5+1)*3);
                ctx.font = 'bold 14px "Comic Sans MS"';
                ctx.fillText('Z', 68, -6+bo+Math.sin(breath*1.5+2)*3);

                requestAnimationFrame(animate);
            }
            animate();
        }

        // ============================================
        // 初始化
        // ============================================
        function init() {
            updateWeather();
            drawCat();
            // 每小时自动更新
            setInterval(updateWeather, 3600000);
        }

        init();
    </script>
</body>
</html>
